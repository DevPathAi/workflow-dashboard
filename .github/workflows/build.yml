name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'src/**'
      - 'index.html'
      - 'eslint.config.js'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # npm ci 대신 install — Windows에서 생성한 lock의 크로스플랫폼
      # 옵셔널 의존성(@emnapi/* 등) 불일치를 Linux 러너에서 갱신 허용.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run validate:data
      - run: npm run build

      - name: Copy data to dist
        run: cp -r data dist/data

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
